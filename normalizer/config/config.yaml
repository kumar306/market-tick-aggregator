kafka:
  brokers:
    - localhost:9092
  topics:
    - "binance.raw.ticks"
    - "binance.raw.level2"
    - "coinbase.raw.ticks"
    - "coinbase.raw.level2"
    - "kraken.raw.ticks"
    - "kraken.raw.book"
  consumer_group: normalizer-group-1
  max_buffer_records: 5000
  commit_offset_interval_millis: 5000

worker_count: 16
redis_ttl_minutes: 15