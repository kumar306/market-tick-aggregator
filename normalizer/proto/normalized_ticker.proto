syntax = "proto3";

package normalizer;
option go_package = "proto/generated";

message NormalizedTicker {
    string exchange = 1;
    string channel = 2;
    string symbol = 3;
    int64 event_ts = 4;
    double price = 5;
    double volume = 6;
    // optional fields - varies with exchange
    double open = 7;
    double close = 8;
    double low = 9;
    double high = 10;
    int64 seq_id = 11;
}