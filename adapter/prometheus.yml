# start promethus as a docker image
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "market-adapter"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:2112"]
    honor_labels: false
    honor_timestamps: true
    scheme: http
    follow_redirects: true
    body_size_limit: "0"
    sample_limit: 0
    label_limit: 0
    label_name_length_limit: 0
    label_value_length_limit: 0
    target_limit: 0