# config validation

kafka:
  bootstrap_servers:
    - localhost:9092
  topics:
    upstream: normalized.book
    downstream: aggregated.book
  consumer_group: orderbook-group-1
  max_buffer_records: 5000
  backpressure:
    queue_usage_high_threshold: 0.85
    confirm_seconds: 7
    poll_interval_ms: 1000
    queue_usage_low_threshold: 0.40
  cb_req_count: 1
  cb_failure_ratio: 0.8
  produce_error_buffer_size: 1000
  flush_interval_seconds: 10

redis:
  ttl_minutes: 2
  pool_size: 1000
  min_idle_conns: 100

worker_count: 8
worker_queue_size: 5000
snapshot_interval_seconds: 20
worker_flush_depth: 15